<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hedi 18th Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  width: 100vw;
  overflow: hidden;
  background: radial-gradient(circle at top, #0a0a0a, #000);
  font-family: 'Montserrat', sans-serif;
  color: #d4af37;
}

/* ✨ subtle moving light background */
.bg-glow {
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(212,175,55,0.08), transparent 60%);
  animation: slowMove 12s infinite alternate ease-in-out;
}

@keyframes slowMove {
  from { transform: translate(-10%, -10%); }
  to { transform: translate(10%, 10%); }
}

/* 🎈 Elegant floating spheres (not cartoon balloons) */
.orb {
  position: absolute;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: radial-gradient(circle, gold, rgba(212,175,55,0.2));
  filter: blur(0.5px);
  animation: floatUp linear infinite;
  opacity: 0.6;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 0; }
  10% { opacity: 0.7; }
  100% { transform: translateY(-120vh); opacity: 0; }
}

/* 🖤 Main card */
.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  width: 90%;
  max-width: 500px;
  animation: fadeIn 2s ease forwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translate(-50%, -45%); }
  to { opacity: 1; transform: translate(-50%, -50%); }
}

/* ✨ Luxury typography */
h1 {
  font-family: 'Cinzel', serif;
  font-size: 38px;
  letter-spacing: 4px;
  margin-bottom: 10px;
}

h2 {
  font-weight: 300;
  margin-bottom: 20px;
  font-size: 18px;
  opacity: 0.9;
}

p {
  font-size: 15px;
  margin: 8px 0;
  opacity: 0.85;
}

/* ✨ gold glow line */
.line {
  width: 60px;
  height: 1px;
  background: gold;
  margin: 20px auto;
  opacity: 0.6;
}

/* subtle shimmer */
.shimmer {
  text-shadow: 0 0 20px rgba(212,175,55,0.4);
}
</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="container">
  <h1 class="shimmer">YOU ARE INVITED</h1>
  <div class="line"></div>

  <h2>Hedi’s 18th Birthday Celebration</h2>

  <p>“You are one of the lucky guests chosen to attend this moment.”</p>

  <p>📅 18 April</p>
  <p>📍 My Home</p>
  <p>⏰ 3:00 PM — Evening Gathering</p>

  <p><b>Dress Code: Black & Gold Elegance</b></p>
</div>

<script>
function createOrb() {
  const o = document.createElement("div");
  o.classList.add("orb");

  o.style.left = Math.random() * window.innerWidth + "px";
  o.style.animationDuration = (6 + Math.random() * 6) + "s";
  o.style.width = (10 + Math.random() * 20) + "px";
  o.style.height = o.style.width;

  document.body.appendChild(o);

  setTimeout(() => o.remove(), 12000);
}

setInterval(createOrb, 200);
</script>

</body>
</html>
