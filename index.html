<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hedi 18th Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  width: 100vw;
  background: radial-gradient(circle at top, #0a0a0a, #000);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Montserrat', sans-serif;
  overflow: hidden;
  color: #d4af37;
}

/* ✨ background glow */
.glow {
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(212,175,55,0.08), transparent 60%);
}

/* 🎮 START SCREEN */
.start-screen {
  text-align: center;
  z-index: 10;
}

.start-btn {
  padding: 14px 28px;
  border: 1px solid #d4af37;
  background: transparent;
  color: #d4af37;
  font-size: 16px;
  cursor: pointer;
  border-radius: 10px;
  transition: 0.4s;
  letter-spacing: 2px;
}

.start-btn:hover {
  background: rgba(212,175,55,0.1);
  transform: scale(1.05);
}

/* 🎁 envelope container */
.game {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

/* envelope */
.envelope {
  width: 240px;
  height: 150px;
  background: linear-gradient(145deg, #111, #000);
  border: 1px solid #d4af37;
  border-radius: 12px;
  position: relative;
  cursor: pointer;
  box-shadow: 0 0 25px rgba(212,175,55,0.15);
  transition: transform 0.5s ease;
}

.envelope:hover {
  transform: scale(1.05);
}

/* flap */
.envelope::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 50%;
  background: #111;
  border-bottom: 1px solid #d4af37;
  transform-origin: top;
  transition: 0.8s ease;
}

/* open animation */
.envelope.open::before {
  transform: rotateX(180deg);
}

/* letter */
.letter {
  width: 90%;
  max-width: 500px;
  background: rgba(0,0,0,0.95);
  border: 1px solid #d4af37;
  padding: 30px;
  text-align: center;
  border-radius: 16px;
  opacity: 0;
  transform: translateY(30px);
  transition: 1s ease;
  box-shadow: 0 0 40px rgba(212,175,55,0.2);
}

.letter.show {
  opacity: 1;
  transform: translateY(0);
}

/* text */
h1 {
  font-family: 'Cinzel', serif;
  letter-spacing: 3px;
  margin-bottom: 10px;
}

p {
  margin: 8px 0;
  font-size: 15px;
  opacity: 0.85;
}

.small {
  font-size: 13px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="glow"></div>

<!-- 🎮 START SCREEN -->
<div class="start-screen" id="startScreen">
  <h2 style="margin-bottom:20px;">Hedi’s Invitation Game</h2>
  <button class="start-btn" onclick="startGame()">ENTER</button>
  <p class="small">Tap to unlock invitation</p>
</div>

<!-- 🎁 GAME -->
<div class="game" id="game">

  <div class="envelope" id="envelope" onclick="openEnvelope()"></div>

  <div class="letter" id="letter">
    <h1>YOU ARE INVITED</h1>

    <p>✨ Hedi’s 18th Birthday ✨</p>
    <p>“You are one of the selected guests.”</p>

    <p>📅 18 April</p>
    <p>📍 My Home</p>
    <p>⏰ 3:00 PM (Evening Celebration)</p>

    <p><b>Dress Code: Black & Gold</b></p>
  </div>

</div>

<script>
function startGame() {
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("game").style.display = "flex";
}

function openEnvelope() {
  document.getElementById("envelope").classList.add("open");

  setTimeout(() => {
    document.getElementById("letter").classList.add("show");
  }, 800);
}
</script>

</body>
</html>
