<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hedi 18th Birthday</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  width: 100vw;
  overflow: hidden;
  background: radial-gradient(circle at top, #111, #000);
  font-family: Georgia, serif;
}

/* 🎈 Balloons */
.balloon {
  position: absolute;
  bottom: -120px;
  width: 45px;
  height: 60px;
  border-radius: 50%;
  animation: floatUp linear infinite;
  opacity: 0.85;
}

.balloon::after {
  content: "";
  position: absolute;
  width: 2px;
  height: 40px;
  background: rgba(255,255,255,0.5);
  top: 60px;
  left: 50%;
}

.gold { background: gold; }
.black { background: #111; border: 1px solid gold; }

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 0; }
  10% { opacity: 1; }
  100% { transform: translateY(-120vh); opacity: 0; }
}

/* ✨ Center invite */
.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: gold;
  width: 90%;
  max-width: 420px;
  animation: fadeIn 2s ease forwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translate(-50%, -40%); }
  to { opacity: 1; transform: translate(-50%, -50%); }
}

h1 {
  font-size: 34px;
  letter-spacing: 3px;
  margin-bottom: 10px;
}

h2 {
  font-weight: normal;
  margin-bottom: 15px;
}

p {
  font-size: 16px;
  margin: 6px 0;
  opacity: 0.9;
}

/* 💛 glow effect */
.glow {
  text-shadow: 0 0 15px gold;
}

/* fade overlay intro */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: black;
  animation: disappear 2s ease forwards;
  z-index: 10;
}

@keyframes disappear {
  to { opacity: 0; visibility: hidden; }
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">
  <h1 class="glow">YOU'RE INVITED</h1>
  <h2>Hedi is turning 18</h2>

  <p>✨ You are one of the luckiest persons on Earth ✨</p>

  <p>📅 18 April</p>
  <p>📍 My Home</p>
  <p>⏰ 3:00 PM (Evening Celebration)</p>

  <p><b>Dress Code: Black & Gold</b></p>
</div>

<script>
function createBalloon() {
  const b = document.createElement("div");
  b.classList.add("balloon");

  const colors = ["gold", "black"];
  b.classList.add(colors[Math.floor(Math.random() * 2)]);

  b.style.left = Math.random() * window.innerWidth + "px";
  b.style.animationDuration = (6 + Math.random() * 4) + "s";

  document.body.appendChild(b);

  setTimeout(() => b.remove(), 10000);
}

setInterval(createBalloon, 250);
</script>

</body>
</html>
